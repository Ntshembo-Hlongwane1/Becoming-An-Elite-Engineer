<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 650" width="100%" height="100%">
  <defs>
    <style>
      .edge { stroke: #333; stroke-width: 2.5; fill: none; stroke-linejoin: round; }
      .node-rect { fill: #ECECFF; stroke: #9370DB; stroke-width: 2; rx: 8; ry: 8; }
      .node-text { font-family: 'trebuchet ms', verdana, arial, sans-serif; font-size: 16px; fill: #333; text-anchor: middle; dominant-baseline: central; font-weight: bold; }
      .title-text { font-family: 'trebuchet ms', verdana, arial, sans-serif; font-size: 22px; font-weight: bold; fill: #333; text-anchor: middle; }
      .summary-rect { fill: #dff0d8; stroke: #3c763d; stroke-width: 2; rx: 25; ry: 25; }
      .summary-text { font-family: 'trebuchet ms', verdana, arial, sans-serif; font-size: 20px; fill: #3c763d; text-anchor: middle; dominant-baseline: central; font-weight: bold; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="800" y="40" class="title-text">Decision Tree: 4 Shirts × 3 Shorts Outfit Combinations</text>

  <!-- Edge Paths -->
  <g id="edgePaths">
    <!-- Root to Shirts -->
    <path class="edge" d="M 800 80 L 300 180" marker-end="url(#arrow)" />
    <path class="edge" d="M 800 80 L 633 180" marker-end="url(#arrow)" />
    <path class="edge" d="M 800 80 L 966 180" marker-end="url(#arrow)" />
    <path class="edge" d="M 800 80 L 1300 180" marker-end="url(#arrow)" />

    <!-- Shirts to Shorts (T1) - Now ending at y=360 (top edge) -->
    <path class="edge" d="M 300 220 L 150 360" marker-end="url(#arrow)" />
    <path class="edge" d="M 300 220 L 300 360" marker-end="url(#arrow)" />
    <path class="edge" d="M 300 220 L 450 360" marker-end="url(#arrow)" />

    <!-- Shirts to Shorts (T2) -->
    <path class="edge" d="M 633 220 L 483 360" marker-end="url(#arrow)" />
    <path class="edge" d="M 633 220 L 633 360" marker-end="url(#arrow)" />
    <path class="edge" d="M 633 220 L 783 360" marker-end="url(#arrow)" />

    <!-- Shirts to Shorts (T3) -->
    <path class="edge" d="M 966 220 L 816 360" marker-end="url(#arrow)" />
    <path class="edge" d="M 966 220 L 966 360" marker-end="url(#arrow)" />
    <path class="edge" d="M 966 220 L 1116 360" marker-end="url(#arrow)" />

    <!-- Shirts to Shorts (T4) -->
    <path class="edge" d="M 1300 220 L 1150 360" marker-end="url(#arrow)" />
    <path class="edge" d="M 1300 220 L 1300 360" marker-end="url(#arrow)" />
    <path class="edge" d="M 1300 220 L 1450 360" marker-end="url(#arrow)" />
  </g>

  <!-- Nodes -->
  <g id="nodes">
    <!-- Root Node -->
    <g transform="translate(800, 60)">
      <rect x="-50" y="-20" width="100" height="40" class="node-rect" />
      <text x="0" y="0" class="node-text">Start</text>
    </g>

    <!-- Shirts (T1 - T4) -->
    <g transform="translate(300, 200)">
      <rect x="-35" y="-20" width="70" height="40" class="node-rect" />
      <text x="0" y="0" class="node-text">T1</text>
    </g>
    <g transform="translate(633, 200)">
      <rect x="-35" y="-20" width="70" height="40" class="node-rect" />
      <text x="0" y="0" class="node-text">T2</text>
    </g>
    <g transform="translate(966, 200)">
      <rect x="-35" y="-20" width="70" height="40" class="node-rect" />
      <text x="0" y="0" class="node-text">T3</text>
    </g>
    <g transform="translate(1300, 200)">
      <rect x="-35" y="-20" width="70" height="40" class="node-rect" />
      <text x="0" y="0" class="node-text">T4</text>
    </g>

    <!-- Shorts for T1 -->
    <g transform="translate(150, 380)">
      <rect x="-40" y="-20" width="80" height="40" class="node-rect" />
      <text x="0" y="0" class="node-text">T1 S1</text>
    </g>
    <g transform="translate(300, 380)">
      <rect x="-40" y="-20" width="80" height="40" class="node-rect" />
      <text x="0" y="0" class="node-text">T1 S2</text>
    </g>
    <g transform="translate(450, 380)">
      <rect x="-40" y="-20" width="80" height="40" class="node-rect" />
      <text x="0" y="0" class="node-text">T1 S3</text>
    </g>

    <!-- Shorts for T2 -->
    <g transform="translate(483, 380)">
      <rect x="-40" y="-20" width="80" height="40" class="node-rect" />
      <text x="0" y="0" class="node-text">T2 S1</text>
    </g>
    <g transform="translate(633, 380)">
      <rect x="-40" y="-20" width="80" height="40" class="node-rect" />
      <text x="0" y="0" class="node-text">T2 S2</text>
    </g>
    <g transform="translate(783, 380)">
      <rect x="-40" y="-20" width="80" height="40" class="node-rect" />
      <text x="0" y="0" class="node-text">T2 S3</text>
    </g>

    <!-- Shorts for T3 -->
    <g transform="translate(816, 380)">
      <rect x="-40" y="-20" width="80" height="40" class="node-rect" />
      <text x="0" y="0" class="node-text">T3 S1</text>
    </g>
    <g transform="translate(966, 380)">
      <rect x="-40" y="-20" width="80" height="40" class="node-rect" />
      <text x="0" y="0" class="node-text">T3 S2</text>
    </g>
    <g transform="translate(1116, 380)">
      <rect x="-40" y="-20" width="80" height="40" class="node-rect" />
      <text x="0" y="0" class="node-text">T3 S3</text>
    </g>

    <!-- Shorts for T4 -->
    <g transform="translate(1150, 380)">
      <rect x="-40" y="-20" width="80" height="40" class="node-rect" />
      <text x="0" y="0" class="node-text">T4 S1</text>
    </g>
    <g transform="translate(1300, 380)">
      <rect x="-40" y="-20" width="80" height="40" class="node-rect" />
      <text x="0" y="0" class="node-text">T4 S2</text>
    </g>
    <g transform="translate(1450, 380)">
      <rect x="-40" y="-20" width="80" height="40" class="node-rect" />
      <text x="0" y="0" class="node-text">T4 S3</text>
    </g>
  </g>

  <!-- Summary / Total Count -->
  <g transform="translate(800, 540)">
    <rect x="-150" y="-30" width="300" height="60" class="summary-rect" />
    <text x="0" y="0" class="summary-text">Total Outfits = 4 × 3 = 12</text>
  </g>
</svg>